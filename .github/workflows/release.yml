name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── 1. Generate trilingual release notes ──────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          VALUE="${REF_NAME:-$INPUT_TAG}"
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

      - name: Verify tag is on main
        run: |
          git fetch origin main --depth=1
          TAG_COMMIT=$(git rev-parse "${{ steps.tag.outputs.value }}")
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Tag ${{ steps.tag.outputs.value }} is not reachable from origin/main. Only release from main."
            exit 1
          fi

      - name: Find previous tag
        id: prev
        env:
          CURRENT_TAG: ${{ steps.tag.outputs.value }}
        run: |
          PREV=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        env:
          CURRENT_TAG: ${{ steps.tag.outputs.value }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: |
          chmod +x .github/scripts/gen-release-notes.sh
          BODY=$(.github/scripts/gen-release-notes.sh "$CURRENT_TAG" "$PREV_TAG")
          {
            echo 'body<<RELEASE_BODY_EOF'
            echo "$BODY"
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

  # ── 2. Desktop builds (macOS / Linux / Windows) ───────────────────────────
  desktop:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
            label: Linux-x64
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc
            rust-targets: aarch64-pc-windows-msvc
            label: Windows-ARM64

    runs-on: ${{ matrix.platform }}
    name: Desktop (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify icons exist
        shell: bash
        run: |
          ICON_DIR="packages/client/src-tauri/icons"
          if [ ! -f "$ICON_DIR/icon.icns" ] || [ ! -f "$ICON_DIR/icon.ico" ]; then
            echo "::error::Icons missing from repo. Run 'bunx tauri icon <source.png>' locally and commit the icons/ directory."
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/client
          tauriScript: bunx tauri
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Confer ${{ needs.prepare.outputs.tag }}"
          releaseBody: ${{ needs.prepare.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── 3. Android APK ────────────────────────────────────────────────────────
  android:
    needs: prepare
    runs-on: ubuntu-latest
    name: Android

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify icons exist
        run: |
          ICON_DIR="packages/client/src-tauri/icons"
          if [ ! -f "$ICON_DIR/icon.icns" ] || [ ! -f "$ICON_DIR/icon.ico" ]; then
            echo "::error::Icons missing from repo. Run 'bunx tauri icon <source.png>' locally and commit the icons/ directory."
            exit 1
          fi

      - name: Init Android project
        working-directory: packages/client
        run: bunx tauri android init

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/confer-release.jks

      - name: Build Android APK (signed)
        working-directory: packages/client
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          TAURI_ANDROID_KEYSTORE_PATH: /tmp/confer-release.jks
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bunx tauri android build --apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: packages/client/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ${{ needs.prepare.outputs.body }}
          files: packages/client/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ── 4. iOS (unsigned, artifact only) ─────────────────────────────────────
  ios:
    runs-on: macos-latest
    name: iOS

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify icons exist
        run: |
          ICON_DIR="packages/client/src-tauri/icons"
          if [ ! -f "$ICON_DIR/icon.icns" ] || [ ! -f "$ICON_DIR/icon.ico" ]; then
            echo "::error::Icons missing from repo. Run 'bunx tauri icon <source.png>' locally and commit the icons/ directory."
            exit 1
          fi

      - name: Init iOS project
        working-directory: packages/client
        run: bunx tauri ios init

      - name: Build iOS (unsigned)
        working-directory: packages/client
        run: bunx tauri ios build --export-method debugging

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: packages/client/src-tauri/gen/apple/build/**/*.app

  # ── 5. Post-release: update GitHub About + sync labels ───────────────────
  finalize:
    needs: [desktop, android]
    runs-on: ubuntu-latest
    name: Finalize (About + Labels)
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Update repository About
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh repo edit "$REPO" \
            --description "A2A protocol platform — let your AI Agent speak for you · AI 代理通信平台 · AIエージェント間通信" \
            --homepage "https://github.com/$REPO" \
            --add-topic "a2a-protocol" \
            --add-topic "ai-agents" \
            --add-topic "did-web" \
            --add-topic "tauri" \
            --add-topic "bun" \
            --add-topic "typescript" \
            --add-topic "mcp" \
            || echo "::warning::gh repo edit failed — token may need 'repo' write scope"

      - name: Sync labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, sys

          try:
              import yaml
          except ImportError:
              subprocess.run(["pip", "install", "-q", "pyyaml"], check=True)
              import yaml

          with open(".github/labels.yml") as f:
              labels = yaml.safe_load(f)

          failed = []
          for label in labels:
              name  = label["name"]
              color = label["color"]
              desc  = label.get("description", "")
              r = subprocess.run(
                  ["gh", "label", "edit", name, "--color", color, "--description", desc],
                  capture_output=True, text=True
              )
              if r.returncode != 0:
                  r2 = subprocess.run(
                      ["gh", "label", "create", name,
                       "--color", color, "--description", desc, "--force"],
                      capture_output=True, text=True
                  )
                  if r2.returncode != 0:
                      failed.append(f"{name}: {r2.stderr.strip()}")

          if failed:
              print("::warning::Label sync issues:\n" + "\n".join(failed), file=sys.stderr)
          else:
              print(f"Synced {len(labels)} labels.")
          PYEOF
