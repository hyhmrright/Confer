services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: confer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-confer}
      POSTGRES_DB: confer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - natsdata:/data

  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-confer}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-confer-secret}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  migrate:
    build:
      context: ..
      dockerfile: infra/gateway.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/packages/gateway
    environment:
      DATABASE_URL: postgres://confer:${POSTGRES_PASSWORD:-confer}@postgres:5432/confer
    command: ["bun", "run", "src/db/migrate.ts"]
    restart: "no"

  gateway:
    build:
      context: ..
      dockerfile: infra/gateway.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://confer:${POSTGRES_PASSWORD:-confer}@postgres:5432/confer
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000

  client:
    build:
      context: ..
      dockerfile: infra/client.Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - gateway

volumes:
  pgdata:
  redisdata:
  natsdata:
  qdrantdata:
  miniodata:
